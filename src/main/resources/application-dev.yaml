spring:
  thymeleaf:
    cache: false
  datasource:
    url: ${DB_URL}
    driver-class-name: ${DB_DRIVER}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: ${JWT_SECRET:hdmf-auth-secret-key-must-be-at-least-32-chars-dev}

cookie:
  domain: .dev.yourdomain.com

logging:
  level:
    root: INFO
    com.hmdf: DEBUG
