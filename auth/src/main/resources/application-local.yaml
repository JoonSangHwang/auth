spring:
  thymeleaf:
    cache: false
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: hdmf-auth-secret-key-must-be-at-least-32-chars-local

cookie:
  domain: ""  # localhost는 도메인 설정 불필요

logging:
  level:
    root: DEBUG
    com.hmdf: DEBUG
    # IntelliJ JMX 모니터링으로 인한 RMI 내부 통신 로그 억제
    sun.rmi: WARN
    javax.management: WARN
