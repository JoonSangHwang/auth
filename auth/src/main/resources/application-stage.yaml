spring:
  thymeleaf:
    cache: true
  datasource:
    url: ${DB_URL}
    driver-class-name: ${DB_DRIVER}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  secret: ${JWT_SECRET}

cookie:
  domain: .stage.yourdomain.com

logging:
  level:
    root: INFO
    com.hmdf: INFO
