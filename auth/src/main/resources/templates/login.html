<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            width: 340px;
        }
        h2 { text-align: center; margin-bottom: 28px; color: #333; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #555; }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #4a90e2; }
        button {
            width: 100%;
            padding: 11px;
            background: #4a90e2;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        button:hover { background: #357abd; }
        .message { margin-top: 14px; text-align: center; font-size: 13px; color: #e74c3c; min-height: 18px; }
    </style>
</head>
<body>
<div class="card">
    <h2>로그인</h2>
    <div class="form-group">
        <label for="username">아이디</label>
        <input type="text" id="username" placeholder="아이디를 입력하세요" />
    </div>
    <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요"
               onkeydown="if(event.key==='Enter') login()" />
    </div>
    <button onclick="login()">로그인</button>
    <p class="message" id="message"></p>
</div>

<script>
    const clientId = new URLSearchParams(window.location.search).get('clientId');

    function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const messageEl = document.getElementById('message');

        if (!username || !password) {
            messageEl.textContent = '아이디와 비밀번호를 입력해주세요.';
            return;
        }

        fetch('/oauth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ clientId, username, password })
        })
        .then(res => res.json().then(data => ({ status: res.status, data })))
        .then(({ status, data }) => {
            if (status === 200) {
                window.location.href = data.data.redirectUrl;
            } else {
                messageEl.textContent = data.message || '로그인에 실패했습니다.';
            }
        })
        .catch(() => {
            messageEl.textContent = '서버 오류가 발생했습니다.';
        });
    }
</script>
</body>
</html>
